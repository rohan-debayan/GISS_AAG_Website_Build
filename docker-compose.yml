services:
  postgres:
    image: postgres:16
    container_name: giss_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: giss
      POSTGRES_USER: giss
      POSTGRES_PASSWORD: giss_dev_password
    ports:
      - '5432:5432'
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U giss -d giss']
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
